<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Steak & Co. | Contact</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&family=Playfair+Display:wght@600&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Poppins', sans-serif; }
        h2, h4, .logo { font-family: 'Playfair Display', serif; }
        
        /* تغيير الخلفية للون الأبيض الناصع والنصوص للرمادي الداكن */
        body { background-color: #ffffff; color: #444444; }
        
        /* تغيير خلفية الهيدر للون لافندر ناعم والبوردر لبربل فاتح */
        .navbar { display: flex; justify-content: space-between; align-items: center; padding: 25px 8%; background-color: #fcf7ff; border-bottom: 1px solid #ebdcf0; }
        
        /* تغيير لون اللوجو للبربل الدافئ */
        .logo { font-size: 28px; color: #6c5270; }
        .nav-links { display: flex; list-style: none; }
        .nav-links li { margin: 0 20px; }
        
        /* تغيير ألوان اللينكات لدرجات البربل */
        .nav-links a { font-size: 15px; color: #7c6e7f; text-decoration: none; }
        .nav-links a:hover, .nav-links .active { color: #9c62a1; }

        .contact-container { padding: 80px 8%; text-align: center; max-width: 900px; margin: 0 auto; }
        
        /* تغيير عنوان الصفحة للون البربل */
        .contact-container h2 { font-size: 42px; color: #6c5270; margin-bottom: 40px; }
        .contact-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); gap: 30px; }
        
        /* تغيير خلفية كروت التواصل للون بينك خفيف جداً مع خط بربل وبوردر بينك */
        .contact-box { background-color: #fff5f8; padding: 40px 20px; border-top: 3px solid #ffc4d6; border-radius: 8px; box-shadow: 0 4px 15px rgba(255, 196, 214, 0.2); }
        .contact-box h4 { color: #6c5270; margin-bottom: 10px; }
        
        /* تغيير لون اللينك جوه الكارت للبربل */
        .contact-box a { color: #9c62a1; text-decoration: none; font-weight: bold; }
        
        /* تغيير زرار العودة للون البينك الجذاب والكتابة بالبربل الغامق */
        .back-btn { display: inline-block; margin-top: 40px; background-color: #ffc4d6; color: #3b223f; padding: 10px 30px; text-decoration: none; font-weight: 600; border-radius: 20px; }
    </style>
</head>
<body>

    <header class="navbar">
        <div class="logo">STEAK & CO.</div>
        <nav>
            <ul class="nav-links">
                <li><a href="index.html">Home</a></li>
                <li><a href="menu.html">Menu</a></li>
                <li><a href="about.html">Our Story</a></li>
                <li><a href="contact.html" class="active">Contact</a></li>
            </ul>
        </nav>
    </header>

    <div class="contact-container">
        <h2>Visit & Contact Us</h2>
        <div class="contact-grid">
            <div class="contact-box">
                <h4>Our Location</h4>
                <p><a href="https://maps.google.com" target="_blank">📍 Open Location on Google Maps</a></p>
            </div>
        </div>
    </div>

</body>
</html>
